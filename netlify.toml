[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://sungkargroup.com/*"
  to = "https://www.sungkargroup.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://sungkargroup.com/*"
  to = "https://www.sungkargroup.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.clarity.ms https://identity.netlify.com https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://www.clarity.ms https://*.clarity.ms https://api.web3forms.com https://identity.netlify.com https://api.netlify.com; frame-src 'self' https://www.google.com https://maps.google.com https://www.youtube.com https://www.youtube-nocookie.com; form-action 'self' https://api.web3forms.com; frame-ancestors 'none'; worker-src 'self' blob:; upgrade-insecure-requests"
    Link = "</sitemap-index.xml>; rel=\"sitemap\", </llms.txt>; rel=\"alternate\"; type=\"text/plain\", </feed.xml>; rel=\"alternate\"; type=\"application/rss+xml\""
# Future discovery endpoints can be appended here when shipped:
# Link = "</.well-known/api-catalog>; rel=\"api-catalog\", </schemamap.xml>; rel=\"schemamap\""
