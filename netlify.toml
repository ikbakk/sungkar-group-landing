[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://sungkargroup.com/*"
  to = "https://www.sungkargroup.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://sungkargroup.com/*"
  to = "https://www.sungkargroup.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
