name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check
      - run: npm test
      - run: npm run check
      - run: npm run validate
      - run: npm run images:barrel
      - run: npm run check:images
      - run: npm run build
