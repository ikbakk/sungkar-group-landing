name: External link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --accept 200,206,302,405,429
            --max-redirects 8
            --exclude 'https://api.web3forms.com/submit'
            --exclude 'https://www.clarity.ms/tag/'
            --exclude 'https://www.facebook.com/sharer/sharer.php.*'
            --exclude 'https://wa.me/.*\$.*'
            --exclude 'https://wa.me/\?text=.*'
            --exclude 'https://www.sungkargroup.com/schemamap.xml'
            'src/**/*.astro'
            'src/**/*.md'
            'src/**/*.mdx'
            'public/**/*.html'
            'public/**/*.txt'
